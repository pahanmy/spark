<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK - Hab Pengurusan Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .bg-pattern {
            background-color: #312e81; 
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234f46e5' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .admin-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .admin-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen selection:bg-indigo-500 selection:text-white">

    <div id="login-section" class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 p-8 mx-4 transform transition-all duration-500 z-50">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-indigo-500 to-blue-600 text-white mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight uppercase">Sistem Admin SPARK</h1>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-2">Log Masuk Selamat</p>
        </div>

        <form id="login-form" onsubmit="checkPassword(event)" class="space-y-5">
            <div>
                <input type="password" id="password-input" placeholder="Masukkan Kata Laluan" class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-semibold text-center tracking-widest focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" required>
                <p id="error-msg" class="text-red-500 text-[10px] font-bold uppercase tracking-wider text-center mt-2 hidden">✖ Akses Ditolak!</p>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md uppercase tracking-widest flex items-center justify-center gap-2 transition-all">
                Akses Sistem
            </button>
        </form>
    </div>

    <div id="dashboard-section" class="w-full h-screen hidden opacity-0 transition-opacity duration-700 flex-col overflow-y-auto">
        
        <div class="bg-pattern pt-12 pb-24 px-6 relative border-b-4 border-indigo-500 shrink-0">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight uppercase drop-shadow-md">Hab Pengurusan Utama</h1>
                    <p class="text-indigo-200 font-medium mt-1 text-sm md:text-base">Pilih modul pengurusan di bawah.</p>
                </div>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-colors flex items-center gap-2 backdrop-blur-sm shadow-sm">
                    Log Keluar
                </button>
            </div>
            <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] opacity-30 pointer-events-none"></div>
        </div>

        <div class="max-w-6xl mx-auto px-4 sm:px-6 w-full -mt-16 relative z-20 flex-grow pb-12">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="module-grid">
                <div class="col-span-full text-center p-10 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <svg class="animate-spin h-8 w-8 mx-auto text-indigo-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-wider">Memuatkan modul...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = firebaseConfig.projectId;
        const collectionPath = `artifacts/${appId}/public/data/spark_admin_modules`;

        // SVGs untuk ikon-ikon yang kita set di tetap-admin-hub
        const iconPaths = {
            calendar: '<path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16 11h-4v4h4v-4z" />',
            users: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />',
            document: '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />',
            chart: '<path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />',
            cog: '<path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />'
        };

        // Pemetaan kelas Tailwind mengikut warna
        const colorClasses = {
            indigo: { line: 'bg-indigo-500', iconBg: 'bg-indigo-50 text-indigo-600', hoverIconBg: 'group-hover:bg-indigo-600', textHover: 'group-hover:text-indigo-700' },
            emerald: { line: 'bg-emerald-500', iconBg: 'bg-emerald-50 text-emerald-600', hoverIconBg: 'group-hover:bg-emerald-600', textHover: 'group-hover:text-emerald-700' },
            purple: { line: 'bg-purple-500', iconBg: 'bg-purple-50 text-purple-600', hoverIconBg: 'group-hover:bg-purple-600', textHover: 'group-hover:text-purple-700' },
            rose: { line: 'bg-rose-500', iconBg: 'bg-rose-50 text-rose-600', hoverIconBg: 'group-hover:bg-rose-600', textHover: 'group-hover:text-rose-700' },
            amber: { line: 'bg-amber-500', iconBg: 'bg-amber-50 text-amber-600', hoverIconBg: 'group-hover:bg-amber-500', textHover: 'group-hover:text-amber-700' }
        };

        signInAnonymously(auth).then(() => {
            fetchAndRenderModules();
        });

        function fetchAndRenderModules() {
            const q = query(collection(db, collectionPath), orderBy("createdAt", "asc"));
            
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('module-grid');
                
                if(snap.empty) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center p-12 bg-white rounded-2xl border border-gray-200 border-dashed shadow-sm">
                            <p class="text-sm font-bold text-gray-500 uppercase tracking-wider">Tiada modul dijumpai.</p>
                            <p class="text-xs text-gray-400 mt-2">Ketua Admin perlu menambah modul di tetap-admin-hub.html</p>
                        </div>`;
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const iconSvg = iconPaths[data.icon] || iconPaths['cog']; // default cog if missing
                    const theme = colorClasses[data.color] || colorClasses['indigo'];

                    html += `
                        <a href="${data.url}" class="admin-card group bg-white rounded-2xl p-6 border border-gray-100 flex flex-col h-full relative overflow-hidden shadow-sm">
                            <div class="absolute top-0 left-0 w-full h-1.5 ${theme.line} group-hover:h-2 transition-all"></div>
                            
                            <div class="${theme.iconBg} p-4 rounded-xl w-16 h-16 flex items-center justify-center mb-5 ${theme.hoverIconBg} group-hover:text-white transition-colors duration-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    ${iconSvg}
                                </svg>
                            </div>
                            
                            <h2 class="text-lg font-bold text-gray-800 uppercase tracking-tight mb-2 ${theme.textHover} transition-colors">${data.title}</h2>
                            <p class="text-xs text-gray-500 leading-relaxed font-medium mb-4 flex-grow">${data.desc}</p>
                            
                            <div class="mt-auto flex items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest ${theme.textHover}">
                                Buka Modul <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                            </div>
                        </a>
                    `;
                });
                
                grid.innerHTML = html;
            });
        }
    </script>

    <script>
        const SECRET_PASSWORD = "spark2026";
        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            const loginSection = document.getElementById('login-section');
            const dashboardSection = document.getElementById('dashboard-section');

            if (input === SECRET_PASSWORD) {
                errorMsg.classList.add('hidden');
                loginSection.classList.add('opacity-0', 'scale-95');
                document.body.classList.remove('items-center', 'justify-center');
                
                setTimeout(() => {
                    loginSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    setTimeout(() => dashboardSection.classList.remove('opacity-0'), 50);
                }, 300);
                document.getElementById('password-input').value = '';
            } else {
                errorMsg.classList.remove('hidden');
                loginSection.classList.add('translate-x-2');
                setTimeout(() => loginSection.classList.remove('translate-x-2'), 100);
                setTimeout(() => loginSection.classList.add('-translate-x-2'), 200);
                setTimeout(() => loginSection.classList.remove('-translate-x-2'), 300);
            }
        }

        function logout() {
            const loginSection = document.getElementById('login-section');
            const dashboardSection = document.getElementById('dashboard-section');
            dashboardSection.classList.add('opacity-0');
            setTimeout(() => {
                dashboardSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                document.body.classList.add('items-center', 'justify-center');
                setTimeout(() => loginSection.classList.remove('opacity-0', 'scale-95'), 50);
            }, 500);
        }
    </script>
</body>
</html>
