<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pengurusan Tempahan SPARK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .modal-backdrop { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col min-h-screen selection:bg-indigo-500 selection:text-white">

    <header class="bg-indigo-900 shadow-md sticky top-0 z-40">
        <div class="max-w-screen-2xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white leading-none tracking-tight">PAPAN PEMUKA ADMIN</h1>
                    <p class="text-[10px] text-indigo-200 font-bold uppercase tracking-wider mt-0.5">Pengurusan Tempahan SPARK</p>
                </div>
            </div>
            <div>
                <button onclick="window.location.href='index.html'" class="text-xs font-bold text-indigo-900 bg-white hover:bg-indigo-50 px-4 py-2 rounded-lg transition-colors flex items-center gap-1.5 shadow-sm uppercase tracking-wider">
                    Keluar
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto py-8 px-4 sm:px-6 lg:px-8 flex-grow w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Jumlah Tempahan</p>
                    <p class="text-3xl font-black text-indigo-700" id="stat-total">0</p>
                </div>
                <div class="bg-indigo-50 p-3 rounded-lg text-indigo-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-yellow-600 uppercase tracking-widest">Menunggu</p>
                    <p class="text-3xl font-black text-yellow-600" id="stat-pending">0</p>
                </div>
                <div class="bg-yellow-50 p-3 rounded-lg text-yellow-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Disahkan</p>
                    <p class="text-3xl font-black text-green-600" id="stat-approved">0</p>
                </div>
                <div class="bg-green-50 p-3 rounded-lg text-green-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Ditolak</p>
                    <p class="text-3xl font-black text-red-500" id="stat-rejected">0</p>
                </div>
                <div class="bg-red-50 p-3 rounded-lg text-red-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50/50">
                <h2 class="text-lg font-bold text-gray-800 uppercase tracking-wider">Senarai Permohonan</h2>
                <div class="flex flex-wrap items-center gap-3">
                    <button onclick="approveAllPending()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 text-[11px] font-bold rounded-lg shadow-sm transition uppercase tracking-wider flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                        Sahkan Semua (Menunggu)
                    </button>
                    <select id="filter-status" onchange="renderTable()" class="px-4 py-2 text-sm border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-medium bg-white">
                        <option value="Semua">Semua Status</option>
                        <option value="Menunggu">Menunggu</option>
                        <option value="Disahkan">Disahkan</option>
                        <option value="Ditolak">Ditolak</option>
                    </select>
                </div>
            </div>
            
            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left border-collapse min-w-[850px]">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] font-bold text-gray-500 uppercase tracking-wider border-b border-gray-200">
                            <th class="p-4">Tarikh & Masa</th>
                            <th class="p-4">Sekolah & Pegawai Ditugaskan</th>
                            <th class="p-4">Pemohon & Telefon</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4 text-center">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-sm">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-gray-400">
                                <svg class="animate-spin h-8 w-8 mx-auto mb-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                Memuatkan data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden transform transition-all">
            <div class="bg-indigo-600 p-4 flex justify-between items-center">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider">Butiran Tempahan & Pasukan</h3>
                <button type="button" onclick="closeDetailModal()" class="text-white hover:bg-indigo-500 p-1 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="p-6 max-h-[75vh] overflow-y-auto custom-scroll" id="modal-content">
                </div>
            
            <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-end gap-2 sm:gap-3 flex-wrap" id="modal-actions">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = firebaseConfig.projectId;
        const collectionPath = `artifacts/${appId}/public/data/spark_team_bookings`;
        
        let allBookings = [];

        signInAnonymously(auth).then(() => {
            fetchBookings();
        }).catch(err => console.error("Auth failed", err));

        function fetchBookings() {
            const q = query(collection(db, collectionPath), orderBy("date", "asc"));
            onSnapshot(q, (snap) => {
                allBookings = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateStats();
                renderTable();
            });
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = allBookings.length;
            document.getElementById('stat-pending').textContent = allBookings.filter(b => b.status === 'Menunggu').length;
            document.getElementById('stat-approved').textContent = allBookings.filter(b => b.status === 'Disahkan').length;
            document.getElementById('stat-rejected').textContent = allBookings.filter(b => b.status === 'Ditolak').length;
        }

        function formatTime(timeString) { 
            if(!timeString) return ''; 
            const [h, m] = timeString.split(':'); 
            const hour = parseInt(h); 
            return `${hour % 12 || 12}:${m} ${hour >= 12 ? 'PM' : 'AM'}`; 
        }

        // --- RENDER JADUAL ---
        window.renderTable = function() {
            const tbody = document.getElementById('table-body');
            const filter = document.getElementById('filter-status').value;
            
            let filteredBookings = allBookings;
            if (filter !== "Semua") {
                filteredBookings = allBookings.filter(b => b.status === filter);
            }

            if (filteredBookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500 font-medium">Tiada rekod dijumpai.</td></tr>`;
                return;
            }

            let html = '';
            filteredBookings.forEach((b) => {
                let statusBadge = '';
                if(b.status === 'Menunggu') statusBadge = `<span class="bg-yellow-100 text-yellow-700 border border-yellow-200 px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Menunggu</span>`;
                else if(b.status === 'Disahkan') statusBadge = `<span class="bg-green-100 text-green-700 border border-green-200 px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Disahkan</span>`;
                else statusBadge = `<span class="bg-red-100 text-red-700 border border-red-200 px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Ditolak</span>`;

                // Badge Tugasan (Siapa yang pergi)
                let assignedBadges = '';
                if(b.assignedTo && b.assignedTo.length > 0) {
                    assignedBadges = `<div class="flex flex-wrap gap-1 mt-1.5">` + b.assignedTo.map(n => `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-[8.5px] font-bold uppercase tracking-widest border border-indigo-200">${n}</span>`).join('') + `</div>`;
                }

                // Butang Pantas WA & Status Log WA
                let waQuickButton = '';
                let waLogIndicator = `<div class="flex items-center justify-center gap-1 mt-2 text-[9px] text-red-500 font-bold bg-red-50 px-2 py-1 rounded-md border border-red-200 uppercase tracking-widest w-fit mx-auto"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> WA Belum</div>`;
                
                if(b.waNotified) {
                    waLogIndicator = `<div class="flex items-center justify-center gap-1 mt-2 text-[9px] text-green-700 font-bold bg-green-50 px-2 py-1 rounded-md border border-green-200 uppercase tracking-widest w-fit mx-auto" title="Oleh: ${b.waNotifiedBy} pada ${b.waNotifiedAt}"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Selesai WA</div>`;
                }

                if(b.status === 'Disahkan') {
                    const waText = encodeURIComponent(`Salam sejahtera wakil ${b.schoolName}. Sukacita dimaklumkan bahawa tempahan Sesi Perkongsian Pintar SPARK di sekolah cikgu pada *${b.date} (${formatTime(b.time)})* telah *DISAHKAN*. Jumpa nanti!`);
                    waQuickButton = `<a href="https://wa.me/6${b.contactPhone.replace(/^0/, '')}?text=${waText}" target="_blank" title="Hantar Notis WA (Pantas)" class="bg-[#25D366]/10 hover:bg-[#25D366]/20 text-[#128C7E] p-1.5 rounded transition border border-[#25D366]/30 inline-flex mt-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.489-1.761-1.662-2.062-.173-.299-.018-.462.13-.611.134-.135.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    </a>`;
                }

                html += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4">
                            <p class="font-bold text-gray-800">${b.date}</p>
                            <p class="text-xs text-indigo-600 font-semibold">${formatTime(b.time)}</p>
                            <p class="text-[10px] text-gray-500 mt-2">👥 ${b.attendees || '-'} Org</p>
                        </td>
                        <td class="p-4">
                            <p class="font-bold text-gray-800 uppercase text-xs">${b.schoolName}</p>
                            <p class="text-[10px] text-gray-500 mt-0.5 mb-1">📍 ${b.location}</p>
                            ${assignedBadges}
                        </td>
                        <td class="p-4">
                            <p class="text-xs font-semibold text-gray-800 uppercase">${b.bookedByName}</p>
                            <div class="flex items-center gap-1">
                                <p class="text-[10px] text-gray-500 font-mono mt-0.5">📞 ${b.contactPhone}</p>
                                ${waQuickButton}
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            ${statusBadge}
                            ${waLogIndicator}
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="viewDetails('${b.id}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-1.5 rounded-lg text-xs font-bold transition-colors uppercase tracking-wider border border-indigo-200 shadow-sm">
                                Urus
                            </button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        };

        // --- BUKA MODAL BUTIRAN PENGURUSAN ---
        window.viewDetails = function(id) {
            const b = allBookings.find(x => x.id === id);
            if(!b) return;

            const content = document.getElementById('modal-content');
            const actions = document.getElementById('modal-actions');

            // --- HTML SETUP: Checkbox Tugasan Pegawai ---
            const assigned = b.assignedTo || [];
            const chkFarhan = assigned.includes("Farhan") ? "checked" : "";
            const chkDrLing = assigned.includes("Dr. Ling") ? "checked" : "";
            const chkSengAi = assigned.includes("Seng Ai") ? "checked" : "";

            const assignHtml = `
                <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 h-full">
                    <p class="text-[10px] font-bold text-indigo-800 uppercase tracking-widest mb-3">1. Tugasan Pegawai Hadir</p>
                    <div class="flex flex-col gap-2.5 mb-3">
                        <label class="flex items-center gap-2 text-xs font-bold text-gray-700 cursor-pointer hover:bg-white p-2 rounded-lg transition border border-transparent hover:border-indigo-100 shadow-sm">
                            <input type="checkbox" value="Farhan" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 assign-cb" ${chkFarhan}> Farhan
                        </label>
                        <label class="flex items-center gap-2 text-xs font-bold text-gray-700 cursor-pointer hover:bg-white p-2 rounded-lg transition border border-transparent hover:border-indigo-100 shadow-sm">
                            <input type="checkbox" value="Dr. Ling" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 assign-cb" ${chkDrLing}> Dr. Ling
                        </label>
                        <label class="flex items-center gap-2 text-xs font-bold text-gray-700 cursor-pointer hover:bg-white p-2 rounded-lg transition border border-transparent hover:border-indigo-100 shadow-sm">
                            <input type="checkbox" value="Seng Ai" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 assign-cb" ${chkSengAi}> Seng Ai
                        </label>
                    </div>
                    <button onclick="saveAssignment('${id}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-700 text-[10px] font-bold px-3 py-2.5 rounded-lg transition-colors flex items-center justify-center gap-1 shadow-sm uppercase tracking-wider">
                        Simpan Tugasan
                    </button>
                </div>
            `;

            // --- HTML SETUP: Log Makluman WA ---
            let waHtml = '';
            if (b.waNotified) {
                waHtml = `
                    <div class="bg-green-50 p-4 rounded-xl border border-green-200 h-full flex flex-col justify-center items-center text-center">
                        <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-xs font-bold text-green-800 uppercase tracking-widest">Selesai Dimaklumkan (WA)</p>
                        <p class="text-sm font-semibold text-gray-700 mt-1">Oleh: ${b.waNotifiedBy}</p>
                        <p class="text-[10px] text-gray-500 mt-1 bg-white px-2 py-1 rounded border border-green-100">${b.waNotifiedAt}</p>
                        
                        <button onclick="resetWA('${id}')" class="mt-4 text-[9px] text-red-500 hover:text-red-700 underline font-bold uppercase tracking-widest">Batalkan Log Ini</button>
                    </div>
                `;
            } else {
                waHtml = `
                    <div class="bg-orange-50 p-4 rounded-xl border border-orange-200 h-full flex flex-col justify-between">
                        <div>
                            <p class="text-[10px] font-bold text-orange-800 uppercase tracking-widest mb-3">2. Rekod Makluman WhatsApp</p>
                            <p class="text-[10px] text-orange-700 mb-3 leading-relaxed font-medium">Pilih nama admin yang telah / akan menghantar mesej pengesahan kepada pihak sekolah.</p>
                            <select id="wa-sender-select" class="w-full text-xs font-bold p-2.5 border border-orange-300 rounded-lg outline-none focus:border-orange-500 bg-white mb-3">
                                <option value="">-- Pilih Nama Admin --</option>
                                <option value="Farhan">Farhan</option>
                                <option value="Dr. Ling">Dr. Ling</option>
                                <option value="Seng Ai">Seng Ai</option>
                            </select>
                        </div>
                        <button onclick="markWASent('${id}')" class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white text-[10px] font-bold px-3 py-2.5 rounded-lg transition-colors flex items-center justify-center gap-1.5 shadow-sm uppercase tracking-wider">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Simpan Log & Tanda Selesai
                        </button>
                    </div>
                `;
            }

            // --- HTML SETUP: Tukar Tarikh ---
            let rescheduleHtml = '';
            if(b.status === 'Menunggu' || b.status === 'Disahkan') {
                rescheduleHtml = `
                    <div class="mt-5 bg-blue-50 p-4 rounded-xl border border-blue-200">
                        <p class="text-[10px] font-bold text-blue-800 uppercase tracking-widest mb-2 flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> Cadangan Tukar Tarikh</p>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="date" id="suggested-date" class="flex-grow px-3 py-2.5 text-sm font-bold border border-blue-300 rounded-lg outline-none focus:border-blue-500 bg-white">
                            <button onclick="updateDateAndWA('${b.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-xs font-bold shadow-sm flex justify-center items-center gap-1.5 transition uppercase tracking-wider">
                                Ubah DB & Buka WA
                            </button>
                        </div>
                    </div>
                `;
            }

            content.innerHTML = `
                <div class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Sekolah Pemohon</p>
                            <p class="font-black text-gray-800 uppercase text-sm">${b.schoolName}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Nama Pemohon & Telefon</p>
                            <p class="font-bold text-gray-800 text-sm uppercase">${b.bookedByName} <span class="text-xs text-indigo-600 font-mono ml-1">(${b.contactPhone})</span></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Tarikh</p>
                            <p class="font-bold text-indigo-600 text-sm">${b.date}</p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Masa & Kehadiran</p>
                            <p class="font-bold text-gray-800 text-sm">${formatTime(b.time)} <span class="text-indigo-600 ml-1">(${b.attendees} Org)</span></p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 col-span-2 sm:col-span-1">
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Lokasi</p>
                            <p class="font-bold text-gray-800 text-sm uppercase line-clamp-1">${b.location}</p>
                        </div>
                    </div>

                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Tujuan / Sebab Memohon</p>
                        <div class="bg-yellow-50 p-3.5 rounded-xl border border-yellow-200 text-xs text-yellow-900 italic font-medium">
                            "${b.reason}"
                        </div>
                    </div>
                    
                    <hr class="border-gray-200">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${assignHtml}
                        ${waHtml}
                    </div>

                    ${rescheduleHtml}
                </div>
            `;

            // Setup butang tindakan utama (Approve / Reject / Padam)
            if(b.status === 'Menunggu') {
                actions.innerHTML = `
                    <button onclick="updateStatus('${id}', 'Ditolak')" class="w-full sm:w-auto px-5 py-3 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-100 rounded-xl uppercase tracking-wider transition">Tolak Permohonan</button>
                    <button onclick="updateStatus('${id}', 'Disahkan')" class="w-full sm:w-auto px-6 py-3 text-xs font-bold text-white bg-green-600 hover:bg-green-700 rounded-xl shadow-md uppercase tracking-wider transition flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Sahkan Tempahan Ini</button>
                `;
            } else {
                actions.innerHTML = `
                    <button onclick="updateStatus('${id}', 'Menunggu')" class="w-full sm:w-auto px-5 py-3 text-[10px] font-bold text-yellow-600 bg-yellow-50 hover:bg-yellow-100 rounded-xl uppercase tracking-wider transition sm:mr-auto">Kembali Ke Status Menunggu</button>
                    <button onclick="deleteRecord('${id}')" class="w-full sm:w-auto px-5 py-3 text-[10px] font-bold text-red-600 hover:bg-red-50 rounded-xl uppercase tracking-wider transition border border-transparent hover:border-red-200">Padam Rekod Kekal</button>
                `;
            }

            document.getElementById('detail-modal').classList.remove('hidden');
        };

        window.closeDetailModal = function() {
            document.getElementById('detail-modal').classList.add('hidden');
        };

        // --- FUNGSI SAVE TUGASAN PEGAWAI ---
        window.saveAssignment = async function(id) {
            const checkboxes = document.querySelectorAll('.assign-cb');
            let assigned = [];
            checkboxes.forEach(cb => {
                if(cb.checked) assigned.push(cb.value);
            });

            try {
                const docRef = doc(db, collectionPath, id);
                await updateDoc(docRef, { assignedTo: assigned });
                
                // Alert kecil dan refresh modal
                alert("Berjaya menetapkan tugasan pegawai.");
                viewDetails(id); 
            } catch(e) {
                console.error("Error assigning: ", e);
                alert("Gagal menyimpan rekod tugasan.");
            }
        };

        // --- FUNGSI SAVE REKOD MAKLUMAN WA ---
        window.markWASent = async function(id) {
            const sender = document.getElementById('wa-sender-select').value;
            if(!sender) {
                alert("Sila pilih nama pengirim (Admin) terlebih dahulu.");
                return;
            }

            const now = new Date();
            const timeString = now.toLocaleString('ms-MY', { day:'numeric', month:'short', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true });

            try {
                const docRef = doc(db, collectionPath, id);
                await updateDoc(docRef, { 
                    waNotified: true,
                    waNotifiedBy: sender,
                    waNotifiedAt: timeString
                });
                viewDetails(id); 
            } catch(e) {
                console.error("Error marking WA: ", e);
                alert("Gagal menyimpan log WhatsApp.");
            }
        };

        // Fungsi tambahan untuk membatalkan (reset) log WA jika tersalah tanda
        window.resetWA = async function(id) {
            if(confirm("Batal log makluman WA ini?")) {
                try {
                    const docRef = doc(db, collectionPath, id);
                    await updateDoc(docRef, { 
                        waNotified: false,
                        waNotifiedBy: null,
                        waNotifiedAt: null
                    });
                    viewDetails(id); 
                } catch(e) {
                    alert("Ralat membatalkan log.");
                }
            }
        }

        // --- FUNGSI UPDATE TARIKH KE DATABASE & BUKA WHATSAPP ---
        window.updateDateAndWA = async function(id) {
            const b = allBookings.find(x => x.id === id);
            const newDate = document.getElementById('suggested-date').value;
            
            if(!newDate) {
                alert("Sila pilih tarikh baru terlebih dahulu sebelum menekan butang hantar.");
                return;
            }

            if(confirm(`Tindakan ini akan mengemaskini tarikh tempahan sekolah kepada ${newDate} dalam sistem dan membuka WhatsApp untuk dihantar. Teruskan?`)) {
                try {
                    const docRef = doc(db, collectionPath, id);
                    await updateDoc(docRef, { date: newDate });
                    
                    const waText = encodeURIComponent(`Salam sejahtera wakil ${b.schoolName}. Terima kasih kerana berminat menjemput Team SPARK ke sekolah anda.\n\nWalau bagaimanapun, jadual hakiki kami padat pada tarikh yang dimohon iaitu *${b.date}*.\n\nOleh itu, pihak kami telah mengubah dan menetapkan tarikh taklimat ini ke tarikh baharu iaitu pada: *${newDate}*.\n\nMohon maklum balas pihak cikgu sama ada bersetuju atau tidak dengan tarikh baru ini. Terima kasih.`);
                    
                    window.open(`https://wa.me/6${b.contactPhone.replace(/^0/, '')}?text=${waText}`, '_blank');
                    closeDetailModal();
                } catch(e) {
                    console.error("Error updating date: ", e);
                    alert("Ralat semasa menyimpan tarikh baru ke pangkalan data.");
                }
            }
        };

        // --- URUS PUKAL: SAHKAN SEMUA ---
        window.approveAllPending = async function() {
            const pendingBookings = allBookings.filter(b => b.status === 'Menunggu');
            
            if(pendingBookings.length === 0) {
                alert("Tiada permohonan yang berstatus 'Menunggu' buat masa ini.");
                return;
            }
            
            if(!confirm(`AMARAN PUKAL: Anda pasti mahu MENGESAHKAN semua ${pendingBookings.length} buah sekolah yang sedang menunggu serentak?`)) {
                return;
            }

            try {
                const batch = writeBatch(db);
                pendingBookings.forEach(b => {
                    const docRef = doc(db, collectionPath, b.id);
                    batch.update(docRef, { status: 'Disahkan' });
                });
                
                await batch.commit();
                alert(`Tahniah! Berjaya mengesahkan ${pendingBookings.length} permohonan serentak.`);
            } catch (e) {
                console.error("Bulk approve error: ", e);
                alert("Ralat sistem semasa mengemaskini secara pukal.");
            }
        };

        window.updateStatus = async function(id, newStatus) {
            if(!confirm(`Adakah anda pasti mahu menukar status kepada: ${newStatus}?`)) return;
            try {
                const docRef = doc(db, collectionPath, id);
                await updateDoc(docRef, { status: newStatus });
                closeDetailModal();
            } catch(e) {
                console.error("Error updating status: ", e);
                alert("Ralat semasa mengemaskini status.");
            }
        };

        window.deleteRecord = async function(id) {
            if(!confirm("AMARAN: Adakah anda pasti mahu MEMADAM rekod ini secara kekal?")) return;
            try {
                const docRef = doc(db, collectionPath, id);
                await deleteDoc(docRef);
                closeDetailModal();
            } catch(e) {
                console.error("Error deleting doc: ", e);
                alert("Ralat semasa memadam rekod.");
            }
        };
    </script>
</body>
</html>
