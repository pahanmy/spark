<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Urus SPARK Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        /* Sembunyikan body pada awalnya sehingga pengesahan IC selesai */
        #admin-body { display: none; }
        .btn-preview { pointer-events: none; } /* Supaya butang preview tak boleh ditekan */
    </style>
</head>
<body id="admin-body" class="bg-gray-50 p-4 sm:p-6">
    
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-inner">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white"><path d="M4 4H8V8H4V4Z" fill="currentColor"></path><path d="M4 16H8V20H4V16Z" fill="currentColor"></path><path d="M16 4H20V8H16V4Z" fill="currentColor"></path><path d="M10 4H14V6H10V4Z" fill="currentColor"></path><path d="M10 8H12V10H10V8Z" fill="currentColor"></path><path d="M12 12H14V14H12V12Z" fill="currentColor"></path><path d="M10 16H12V18H10V16Z" fill="currentColor"></path><path d="M14 16H16V18H14V16Z" fill="currentColor"></path><path d="M16 12H18V14H16V12Z" fill="currentColor"></path><path d="M16 8H20V10H16V8Z" fill="currentColor"></path><path d="M12 18H14V20H12V18Z" fill="currentColor"></path><path d="M4 10H6V14H4V10Z" fill="currentColor"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800">SPARK Panel Kawalan</h1>
                    <p class="text-xs text-gray-500">Pengurusan Menu Pautan Pantas & Paparan Butang</p>
                </div>
            </div>
            <button onclick="window.location.href='user.html'" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-lg transition-colors border border-gray-200 shadow-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Kembali
            </button>
        </div>

        <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
            <h2 id="form-title" class="text-sm font-bold text-gray-800 mb-2 uppercase flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Tambah Butang Baharu
            </h2>
            
            <form id="tool-form" class="space-y-4 bg-gray-50 p-4 sm:p-5 rounded-lg border border-gray-200 mt-4">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Papar Di (Target Papan Pemuka)</label>
                        <select id="target-page" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                            <option value="ppd">PPD (user.html)</option>
                            <option value="edu">Sekolah (edu-user.html)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Nama Butang</label>
                        <input type="text" id="btn-label" placeholder="Cth: Sijil Kehadiran" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 uppercase focus:ring-indigo-500 focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">URL / Pautan</label>
                        <input type="text" id="btn-url" placeholder="Cth: sijil.html?ic=[IC]" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500" required>
                        <p class="text-[9px] text-gray-500 mt-1.5 italic">Guna <b>[IC]</b> jika pautan perlukan nombor IC. Cth: sijil.html?ic=[IC]</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Warna Butang</label>
                            <select id="btn-color" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                                <option value="yellow">Kuning (Yellow)</option>
                                <option value="teal">Hijau Biru (Teal)</option>
                                <option value="emerald">Zamrud (Emerald)</option>
                                <option value="blue">Biru (Blue)</option>
                                <option value="indigo">Nila (Indigo)</option>
                                <option value="sky">Biru Muda (Sky)</option>
                                <option value="cyan">Cyan (Cyan)</option>
                                <option value="purple">Ungu (Purple)</option>
                                <option value="pink">Merah Jambu (Pink)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Ikon Butang</label>
                            <select id="btn-icon" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                                <option value="certificate">🎓 Sijil</option>
                                <option value="calendar">📅 Kalendar</option>
                                <option value="report">📄 Laporan/OPR</option>
                                <option value="memo">📝 Memo/Curai</option>
                                <option value="link">🔗 Pautan/Link</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-3 mt-4">
                    <button type="submit" id="submit-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md text-xs uppercase transition-all active:scale-95 flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                        Simpan Butang Baru
                    </button>
                    
                    <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-lg shadow-sm text-xs uppercase transition-all active:scale-95 flex justify-center items-center gap-2">
                        Batal
                    </button>
                </div>
            </form>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
                <h3 class="font-extrabold text-indigo-700 uppercase mb-4 border-b border-gray-100 pb-3 flex justify-between items-center text-sm">
                    Susunan Butang PPD
                    <span class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md font-black" id="count-ppd">0</span>
                </h3>
                <div id="list-ppd" class="space-y-3">Senarai sedang dimuatkan...</div>
            </div>
            
            <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
                <h3 class="font-extrabold text-blue-700 uppercase mb-4 border-b border-gray-100 pb-3 flex justify-between items-center text-sm">
                    Susunan Butang Sekolah
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-md font-black" id="count-edu">0</span>
                </h3>
                <div id="list-edu" class="space-y-3">Senarai sedang dimuatkan...</div>
            </div>
        </div>
    </div>

    <script type="module">
        // ==========================================
        // 1. GATEKEEPER - SEMAKAN IC ADMIN 
        // ==========================================
        const ADMIN_IC = "890522135381";
        const currentStoredIc = localStorage.getItem('user_ic');

        if (!currentStoredIc || currentStoredIc !== ADMIN_IC) {
            alert("🔒 AKSES DINAFIKAN: Halaman ini khas untuk Pentadbir Sistem SPARK sahaja.");
            window.location.href = "index.html";
        } else {
            document.getElementById('admin-body').style.display = 'block';
        }

        // ==========================================
        // 2. FIREBASE & LOGIK UTAMA
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;
        const docRef = doc(db, `artifacts/${appId}/public/data/spark_settings`, 'tools_menu');

        let toolsData = { ppd: [], edu: [] };
        
        // Pembolehubah untuk mod Edit
        let editingTarget = null;
        let editingIndex = null;

        // Pastikan admin login (anonymous) sebelum boleh tulis data
        signInAnonymously(auth).catch((error) => console.error("Login gagal:", error));

        // --- PETA WARNA & IKON (Sama dengan paparan sebenar) ---
        const toolsIconMap = {
            certificate: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>`,
            calendar: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`,
            report: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`,
            memo: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>`,
            link: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>`
        };

        const toolsColorMap = {
            yellow: { wrap: "text-yellow-700 border-yellow-300 bg-yellow-50", icon: "text-yellow-500" },
            teal: { wrap: "text-teal-700 border-teal-300 bg-teal-50", icon: "text-teal-500" },
            emerald: { wrap: "text-emerald-700 border-emerald-300 bg-emerald-50", icon: "text-emerald-500" },
            blue: { wrap: "text-blue-700 border-blue-300 bg-blue-50", icon: "text-blue-500" },
            indigo: { wrap: "text-indigo-700 border-indigo-300 bg-indigo-50", icon: "text-indigo-500" },
            sky: { wrap: "text-sky-700 border-sky-300 bg-sky-50", icon: "text-sky-500" },
            cyan: { wrap: "text-cyan-700 border-cyan-300 bg-cyan-50", icon: "text-cyan-500" },
            purple: { wrap: "text-purple-700 border-purple-300 bg-purple-50", icon: "text-purple-500" },
            pink: { wrap: "text-pink-700 border-pink-300 bg-pink-50", icon: "text-pink-500" }
        };

        // --- DATA DEFAULT (AUTO-SEED) ---
        const defaultButtons = {
            updaterIc: ADMIN_IC,
            ppd: [
                { label: "SIJIL & PENGHARGAAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "KALENDAR RASMI", url: "jadualuser.html", color: "teal", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "indigo", icon: "report" },
                { label: "MEMO DALAMAN", url: "memo.html?ic=[IC]", color: "pink", icon: "memo" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "sky", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ],
            edu: [
                { label: "SIJIL KEHADIRAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "TAKWIM RASMI", url: "jadual-eduuser.html", color: "blue", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "emerald", icon: "report" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "cyan", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ]
        };

        async function loadData() {
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    toolsData = snap.data();
                    if (!toolsData.ppd) toolsData.ppd = [];
                    if (!toolsData.edu) toolsData.edu = [];
                } else {
                    toolsData = defaultButtons;
                    await setDoc(docRef, toolsData);
                }
                renderLists();
            } catch (e) {
                console.error("Gagal memuatkan data:", e);
            }
        }

        // --- RENDER DENGAN PREVIEW BUTANG SEBENAR ---
        function renderLists() {
            const renderHTML = (array, target) => {
                if (!array || array.length === 0) return `<div class="p-4 text-center text-xs text-gray-400 italic bg-gray-50 rounded-lg border border-dashed border-gray-200">Tiada butang ditetapkan.</div>`;
                
                return array.map((btn, index) => {
                    const iconHtml = toolsIconMap[btn.icon] || toolsIconMap['link'];
                    const colorSet = toolsColorMap[btn.color] || toolsColorMap['indigo'];
                    
                    return `
                    <div class="flex flex-col sm:flex-row justify-between items-center bg-gray-50/50 p-3 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow gap-3 group">
                        
                        <div class="flex-shrink-0 w-full sm:w-auto flex justify-center sm:justify-start">
                            <div class="btn-preview bg-white border ${colorSet.wrap} text-gray-600 text-xs font-bold py-2 px-4 rounded-xl shadow-sm flex items-center gap-2 uppercase">
                                <span class="${colorSet.icon}">${iconHtml}</span>
                                ${btn.label}
                            </div>
                        </div>

                        <div class="flex-1 text-center sm:text-left overflow-hidden w-full px-2">
                            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider mb-0.5">Pautan URL:</p>
                            <p class="text-[11px] text-indigo-600 font-medium truncate" title="${btn.url}">${btn.url}</p>
                        </div>

                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            <button onclick="moveUp('${target}', ${index})" class="p-1.5 bg-white border border-gray-200 rounded hover:bg-indigo-50 hover:text-indigo-600 text-gray-500 transition-colors shadow-sm disabled:opacity-30 disabled:cursor-not-allowed" ${index === 0 ? 'disabled' : ''} title="Naik Atas">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" /></svg>
                            </button>
                            
                            <button onclick="moveDown('${target}', ${index})" class="p-1.5 bg-white border border-gray-200 rounded hover:bg-indigo-50 hover:text-indigo-600 text-gray-500 transition-colors shadow-sm disabled:opacity-30 disabled:cursor-not-allowed" ${index === array.length - 1 ? 'disabled' : ''} title="Turun Bawah">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                            </button>
                            
                            <button onclick="editBtn('${target}', ${index})" class="p-1.5 bg-blue-50 border border-blue-200 rounded hover:bg-blue-500 hover:text-white text-blue-600 transition-colors shadow-sm ml-1" title="Kemaskini Butang">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                            </button>

                            <button onclick="deleteBtn('${target}', ${index})" class="p-1.5 bg-red-50 hover:bg-red-500 text-red-500 hover:text-white border border-red-200 rounded transition-colors shadow-sm" title="Padam Butang">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');
            };

            document.getElementById('list-ppd').innerHTML = renderHTML(toolsData.ppd, 'ppd');
            document.getElementById('count-ppd').innerText = toolsData.ppd ? toolsData.ppd.length : 0;

            document.getElementById('list-edu').innerHTML = renderHTML(toolsData.edu, 'edu');
            document.getElementById('count-edu').innerText = toolsData.edu ? toolsData.edu.length : 0;
        }

        // --- FUNGSI EDIT KEMASKINI ---
        window.editBtn = function(target, index) {
            const btnData = toolsData[target][index];
            
            // Masukkan data ke dalam form
            document.getElementById('target-page').value = target;
            document.getElementById('btn-label').value = btnData.label;
            document.getElementById('btn-url').value = btnData.url;
            document.getElementById('btn-color').value = btnData.color;
            document.getElementById('btn-icon').value = btnData.icon;
            
            // Simpan status edit terkini
            editingTarget = target;
            editingIndex = index;
            
            // Ubah butang simpan jadi butang Kemaskini
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.classList.replace('bg-indigo-600', 'bg-blue-600');
            submitBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-blue-700');
            submitBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> Kemaskini Butang`;
            
            // Paparkan tajuk dan butang batal
            document.getElementById('form-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg> Kemaskini Butang`;
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            // Scroll ke atas (ke form)
            document.getElementById('tool-form').scrollIntoView({ behavior: 'smooth' });
        };

        window.cancelEdit = function() {
            editingTarget = null;
            editingIndex = null;
            
            document.getElementById('tool-form').reset();
            
            // Kembalikan UI butang asal
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.classList.replace('bg-blue-600', 'bg-indigo-600');
            submitBtn.classList.replace('hover:bg-blue-700', 'hover:bg-indigo-700');
            submitBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg> Simpan Butang Baru`;
            
            document.getElementById('form-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg> Tambah Butang Baharu`;
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        // --- FUNGSI SUSUN (SORTING) ---
        window.moveUp = async function(target, index) {
            if (index <= 0) return;
            const temp = toolsData[target][index - 1];
            toolsData[target][index - 1] = toolsData[target][index];
            toolsData[target][index] = temp;
            await updateDatabase();
        };

        window.moveDown = async function(target, index) {
            if (index >= toolsData[target].length - 1) return;
            const temp = toolsData[target][index + 1];
            toolsData[target][index + 1] = toolsData[target][index];
            toolsData[target][index] = temp;
            await updateDatabase();
        };

        // --- SIMPAN / KEMASKINI DATA ---
        document.getElementById('tool-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('submit-btn');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Memproses...";

            const newTarget = document.getElementById('target-page').value;
            const newBtn = {
                label: document.getElementById('btn-label').value.toUpperCase(),
                url: document.getElementById('btn-url').value,
                color: document.getElementById('btn-color').value,
                icon: document.getElementById('btn-icon').value
            };

            if (editingIndex !== null) {
                // MOD KEMASKINI
                if (editingTarget === newTarget) {
                    // Update array yang sama
                    toolsData[editingTarget][editingIndex] = newBtn;
                } else {
                    // Jika pengguna tukar target (cth: Pindah dari PPD ke Sekolah)
                    toolsData[editingTarget].splice(editingIndex, 1);
                    if (!toolsData[newTarget]) toolsData[newTarget] = [];
                    toolsData[newTarget].push(newBtn);
                }
            } else {
                // MOD TAMBAH BARU
                if (!toolsData[newTarget]) toolsData[newTarget] = [];
                toolsData[newTarget].push(newBtn);
            }
            
            await updateDatabase();
            cancelEdit(); // Reset form dan state
        });

        // --- PADAM BUTANG ---
        window.deleteBtn = async function(target, index) {
            if(confirm("Adakah anda pasti mahu memadam butang ini?")) {
                toolsData[target].splice(index, 1);
                await updateDatabase();
                
                // Jika butang yang sedang di-edit dipadam, reset form
                if (editingTarget === target && editingIndex === index) {
                    cancelEdit();
                }
            }
        };

        // --- HELPER UNTUK UPDATE KE FIREBASE ---
        async function updateDatabase() {
            toolsData.updaterIc = ADMIN_IC; // WAJIB: Kunci keselamatan Firebase Rules
            try {
                await setDoc(docRef, toolsData);
                renderLists(); // Refresh skrin
            } catch (err) {
                console.error(err);
                alert("Gagal mengemaskini data. Sila pastikan IC anda adalah admin sah.");
            }
        }

        // Mulakan load data
        if (currentStoredIc === ADMIN_IC) {
            loadData();
        }

    </script>
</body>
</html>
