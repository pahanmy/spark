<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Urus SPARK Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        /* Sembunyikan body pada awalnya sehingga pengesahan IC selesai */
        #admin-body { display: none; }
    </style>
</head>
<body id="admin-body" class="bg-gray-50 p-4 sm:p-6">
    
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-inner">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white"><path d="M4 4H8V8H4V4Z" fill="currentColor"></path><path d="M4 16H8V20H4V16Z" fill="currentColor"></path><path d="M16 4H20V8H16V4Z" fill="currentColor"></path><path d="M10 4H14V6H10V4Z" fill="currentColor"></path><path d="M10 8H12V10H10V8Z" fill="currentColor"></path><path d="M12 12H14V14H12V12Z" fill="currentColor"></path><path d="M10 16H12V18H10V16Z" fill="currentColor"></path><path d="M14 16H16V18H14V16Z" fill="currentColor"></path><path d="M16 12H18V14H16V12Z" fill="currentColor"></path><path d="M16 8H20V10H16V8Z" fill="currentColor"></path><path d="M12 18H14V20H12V18Z" fill="currentColor"></path><path d="M4 10H6V14H4V10Z" fill="currentColor"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800">SPARK Panel Kawalan</h1>
                    <p class="text-xs text-gray-500">Pengurusan Menu Pautan Pantas (Tools)</p>
                </div>
            </div>
            <button onclick="window.location.href='user.html'" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-lg transition-colors border border-gray-200 shadow-sm">
                Kembali ke Dashboard
            </button>
        </div>

        <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
            <h2 class="text-sm font-bold text-gray-800 mb-2 uppercase flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Tambah Butang Baharu
            </h2>
            
            <form id="tool-form" class="space-y-4 bg-gray-50 p-4 sm:p-5 rounded-lg border border-gray-200 mt-4">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Papar Di (Target Papan Pemuka)</label>
                        <select id="target-page" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                            <option value="ppd">PPD (user.html)</option>
                            <option value="edu">Sekolah (edu-user.html)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Nama Butang</label>
                        <input type="text" id="btn-label" placeholder="Cth: Sijil Kehadiran" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 uppercase focus:ring-indigo-500 focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">URL / Pautan</label>
                        <input type="text" id="btn-url" placeholder="Cth: sijil.html?ic=[IC]" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500" required>
                        <p class="text-[9px] text-gray-500 mt-1.5 italic">Guna <b>[IC]</b> jika pautan perlukan nombor IC. Cth: sijil.html?ic=[IC]</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Warna Butang</label>
                            <select id="btn-color" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                                <option value="yellow">Kuning (Yellow)</option>
                                <option value="teal">Hijau Biru (Teal)</option>
                                <option value="emerald">Zamrud (Emerald)</option>
                                <option value="blue">Biru (Blue)</option>
                                <option value="indigo">Nila (Indigo)</option>
                                <option value="sky">Biru Muda (Sky)</option>
                                <option value="cyan">Cyan (Cyan)</option>
                                <option value="purple">Ungu (Purple)</option>
                                <option value="pink">Merah Jambu (Pink)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-700 uppercase mb-1">Ikon Butang</label>
                            <select id="btn-icon" class="w-full p-2.5 border border-gray-300 rounded-md text-xs font-semibold text-gray-700 focus:ring-indigo-500 focus:border-indigo-500 bg-white" required>
                                <option value="certificate">🎓 Sijil</option>
                                <option value="calendar">📅 Kalendar</option>
                                <option value="report">📄 Laporan/OPR</option>
                                <option value="memo">📝 Memo/Curai</option>
                                <option value="link">🔗 Pautan/Link</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md text-xs w-full uppercase mt-2 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    Simpan Butang Baru
                </button>
            </form>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
                <h3 class="font-extrabold text-indigo-700 uppercase mb-4 border-b border-gray-100 pb-3 flex justify-between items-center text-sm">
                    Butang PPD (user.html)
                    <span class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md font-black" id="count-ppd">0</span>
                </h3>
                <div id="list-ppd" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">Senarai sedang dimuatkan...</div>
            </div>
            
            <div class="bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100">
                <h3 class="font-extrabold text-blue-700 uppercase mb-4 border-b border-gray-100 pb-3 flex justify-between items-center text-sm">
                    Butang Sekolah (edu-user.html)
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-md font-black" id="count-edu">0</span>
                </h3>
                <div id="list-edu" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">Senarai sedang dimuatkan...</div>
            </div>
        </div>
    </div>

    <script type="module">
        // ==========================================
        // 1. GATEKEEPER - SEMAKAN IC ADMIN 
        // ==========================================
        const ADMIN_IC = "890522135381";
        const currentStoredIc = localStorage.getItem('user_ic');

        if (!currentStoredIc || currentStoredIc !== ADMIN_IC) {
            alert("🔒 AKSES DINAFIKAN: Halaman ini khas untuk Pentadbir Sistem SPARK sahaja.");
            window.location.href = "index.html";
        } else {
            // Lulus semakan, paparkan UI
            document.getElementById('admin-body').style.display = 'block';
        }

        // ==========================================
        // 2. FIREBASE & LOGIK UTAMA
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;
        const docRef = doc(db, `artifacts/${appId}/public/data/spark_settings`, 'tools_menu');

        let toolsData = { ppd: [], edu: [] };

        // Pastikan admin login (anonymous) sebelum boleh tulis data
        signInAnonymously(auth).catch((error) => {
            console.error("Gagal log masuk secara anonymous:", error);
        });

        // --- DATA BUTANG ASAL (AUTO-SEED) ---
        const defaultButtons = {
            updaterIc: ADMIN_IC, // Kunci kelulusan untuk Firebase Rules
            ppd: [
                { label: "SIJIL & PENGHARGAAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "KALENDAR RASMI", url: "jadualuser.html", color: "teal", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "indigo", icon: "report" },
                { label: "MEMO DALAMAN", url: "memo.html?ic=[IC]", color: "pink", icon: "memo" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "sky", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ],
            edu: [
                { label: "SIJIL KEHADIRAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "TAKWIM RASMI", url: "jadual-eduuser.html", color: "blue", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "emerald", icon: "report" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "cyan", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ]
        };

        async function loadData() {
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    toolsData = snap.data();
                    if (!toolsData.ppd) toolsData.ppd = [];
                    if (!toolsData.edu) toolsData.edu = [];
                } else {
                    // Jika belum ada data di pangkalan data, sumbat default
                    toolsData = defaultButtons;
                    await setDoc(docRef, toolsData);
                    console.log("Auto-seed butang lalai berjaya.");
                }
                renderLists();
            } catch (e) {
                console.error("Gagal memuatkan data:", e);
                alert("Ralat menyambung ke pangkalan data.");
            }
        }

        function renderLists() {
            const renderHTML = (array, target) => {
                if (!array || array.length === 0) return `<div class="p-4 text-center text-xs text-gray-400 italic bg-gray-50 rounded-lg border border-dashed border-gray-200">Tiada butang ditetapkan.</div>`;
                
                return array.map((btn, index) => `
                    <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex-1 pr-3 overflow-hidden">
                            <p class="text-[11px] font-bold uppercase text-${btn.color}-600 flex items-center gap-1.5 truncate">
                                <span class="w-2.5 h-2.5 rounded-full bg-${btn.color}-500 flex-shrink-0"></span>
                                <span class="truncate">${btn.label}</span>
                            </p>
                            <p class="text-[10px] text-gray-500 truncate mt-0.5" title="${btn.url}">${btn.url}</p>
                        </div>
                        <button onclick="deleteBtn('${target}', ${index})" class="flex-shrink-0 text-red-500 hover:text-white bg-red-50 hover:bg-red-500 p-2 rounded-md transition-colors border border-red-100 hover:border-red-500 shadow-sm" title="Padam Butang">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `).join('');
            };

            document.getElementById('list-ppd').innerHTML = renderHTML(toolsData.ppd, 'ppd');
            document.getElementById('count-ppd').innerText = toolsData.ppd ? toolsData.ppd.length : 0;

            document.getElementById('list-edu').innerHTML = renderHTML(toolsData.edu, 'edu');
            document.getElementById('count-edu').innerText = toolsData.edu ? toolsData.edu.length : 0;
        }

        document.getElementById('tool-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('submit-btn');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "Memproses...";

            const target = document.getElementById('target-page').value;
            const newBtn = {
                label: document.getElementById('btn-label').value.toUpperCase(),
                url: document.getElementById('btn-url').value,
                color: document.getElementById('btn-color').value,
                icon: document.getElementById('btn-icon').value
            };

            if (!toolsData[target]) toolsData[target] = [];
            toolsData[target].push(newBtn);
            
            // WAJIB: Sertakan IC Updater supaya Firebase Rules bagi lepas!
            toolsData.updaterIc = ADMIN_IC;
            
            try {
                await setDoc(docRef, toolsData);
                document.getElementById('tool-form').reset();
                renderLists();
            } catch (err) {
                console.error(err);
                alert("Gagal menyimpan butang baru. Sila pastikan IC anda adalah admin sah.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg> Simpan Butang Baru`;
            }
        });

        window.deleteBtn = async function(target, index) {
            if(confirm("Adakah anda pasti mahu memadam butang ini?")) {
                toolsData[target].splice(index, 1);
                // WAJIB: Sertakan IC Updater supaya Firebase Rules bagi lepas!
                toolsData.updaterIc = ADMIN_IC;
                
                try {
                    await setDoc(docRef, toolsData);
                    renderLists();
                } catch (err) {
                    console.error(err);
                    alert("Gagal memadam butang.");
                }
            }
        };

        // Mulakan load data jika pengguna adalah Admin
        if (currentStoredIc === ADMIN_IC) {
            loadData();
        }

    </script>
</body>
</html>
