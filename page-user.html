<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Urus SPARK Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Urus Butang SPARK Tools</h2>
            <p class="text-sm text-gray-500 mb-6">Tambah, edit atau buang pautan pantas untuk Papan Pemuka PPD dan Sekolah.</p>

            <form id="tool-form" class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Papar Di (Target)</label>
                        <select id="target-page" class="w-full p-2 border rounded-md text-sm" required>
                            <option value="ppd">PPD (user.html)</option>
                            <option value="edu">Sekolah (edu-user.html)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Nama Butang</label>
                        <input type="text" id="btn-label" placeholder="Cth: Sijil Kehadiran" class="w-full p-2 border rounded-md text-sm uppercase" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">URL / Pautan</label>
                        <input type="text" id="btn-url" placeholder="Cth: sijil.html?ic=[IC]" class="w-full p-2 border rounded-md text-sm" required>
                        <p class="text-[10px] text-gray-500 mt-1">Gunakan <b>[IC]</b> jika pautan perlukan IC pengguna. Cth: sijil.html?ic=[IC]</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Warna</label>
                            <select id="btn-color" class="w-full p-2 border rounded-md text-sm" required>
                                <option value="yellow">Kuning (Yellow)</option>
                                <option value="teal">Hijau Biru (Teal)</option>
                                <option value="emerald">Zamrud (Emerald)</option>
                                <option value="blue">Biru (Blue)</option>
                                <option value="indigo">Nila (Indigo)</option>
                                <option value="sky">Biru Muda (Sky)</option>
                                <option value="cyan">Cyan (Cyan)</option>
                                <option value="purple">Ungu (Purple)</option>
                                <option value="pink">Merah Jambu (Pink)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Ikon</label>
                            <select id="btn-icon" class="w-full p-2 border rounded-md text-sm" required>
                                <option value="certificate">🎓 Sijil</option>
                                <option value="calendar">📅 Kalendar</option>
                                <option value="report">📄 Laporan/OPR</option>
                                <option value="memo">📝 Memo/Curai</option>
                                <option value="link">🔗 Pautan/Link</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded shadow text-sm w-full uppercase">Tambah Butang</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-md">
                <h3 class="font-bold text-indigo-700 uppercase mb-3 border-b pb-2 flex justify-between items-center">
                    Butang PPD (user.html)
                    <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded" id="count-ppd">0</span>
                </h3>
                <div id="list-ppd" class="space-y-2">Senarai sedang dimuatkan...</div>
            </div>
            
            <div class="bg-white p-5 rounded-xl shadow-md">
                <h3 class="font-bold text-blue-700 uppercase mb-3 border-b pb-2 flex justify-between items-center">
                    Butang Sekolah (edu-user.html)
                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded" id="count-edu">0</span>
                </h3>
                <div id="list-edu" class="space-y-2">Senarai sedang dimuatkan...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;
        const docRef = doc(db, `artifacts/${appId}/public/data/spark_settings`, 'tools_menu');

        let toolsData = { ppd: [], edu: [] };

        // --- DATA BUTANG ASAL (DEFAULT SEED) ---
        const defaultButtons = {
            ppd: [
                { label: "SIJIL & PENGHARGAAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "KALENDAR RASMI", url: "jadualuser.html", color: "teal", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "indigo", icon: "report" },
                { label: "MEMO DALAMAN", url: "memo.html?ic=[IC]", color: "pink", icon: "memo" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "sky", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ],
            edu: [
                { label: "SIJIL KEHADIRAN", url: "sijil.html?ic=[IC]", color: "yellow", icon: "certificate" },
                { label: "TAKWIM RASMI", url: "jadual-eduuser.html", color: "blue", icon: "calendar" },
                { label: "ONE PAGE REPORT", url: "opr.html?ic=[IC]", color: "emerald", icon: "report" },
                { label: "MINIT CURAI", url: "minitcurai.html?ic=[IC]", color: "cyan", icon: "memo" },
                { label: "SPARK LINK", url: "spark-link.html?ic=[IC]", color: "purple", icon: "link" }
            ]
        };

        async function loadData() {
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                toolsData = snap.data();
                if (!toolsData.ppd) toolsData.ppd = [];
                if (!toolsData.edu) toolsData.edu = [];
            } else {
                // Jika database masih kosong, auto-seed dengan defaultButtons!
                toolsData = defaultButtons;
                await setDoc(docRef, toolsData);
            }
            renderLists();
        }

        function renderLists() {
            const renderHTML = (array, target) => {
                if (array.length === 0) return `<p class="text-xs text-gray-400 italic">Tiada butang ditetapkan.</p>`;
                return array.map((btn, index) => `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded border border-gray-200">
                        <div>
                            <p class="text-xs font-bold uppercase text-${btn.color}-600 flex items-center gap-1">
                                <span class="w-3 h-3 rounded-full bg-${btn.color}-500 block mr-1"></span>
                                ${btn.label}
                            </p>
                            <p class="text-[10px] text-gray-500">${btn.url}</p>
                        </div>
                        <button onclick="deleteBtn('${target}', ${index})" class="text-red-500 text-[10px] font-bold uppercase bg-red-50 p-1.5 rounded border border-red-200 hover:bg-red-500 hover:text-white transition">Padam</button>
                    </div>
                `).join('');
            };

            document.getElementById('list-ppd').innerHTML = renderHTML(toolsData.ppd, 'ppd');
            document.getElementById('count-ppd').innerText = toolsData.ppd.length;

            document.getElementById('list-edu').innerHTML = renderHTML(toolsData.edu, 'edu');
            document.getElementById('count-edu').innerText = toolsData.edu.length;
        }

        document.getElementById('tool-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const target = document.getElementById('target-page').value;
            const newBtn = {
                label: document.getElementById('btn-label').value.toUpperCase(),
                url: document.getElementById('btn-url').value,
                color: document.getElementById('btn-color').value,
                icon: document.getElementById('btn-icon').value
            };

            toolsData[target].push(newBtn);
            await setDoc(docRef, toolsData);
            document.getElementById('tool-form').reset();
            renderLists();
        });

        window.deleteBtn = async function(target, index) {
            if(confirm("Adakah anda pasti mahu memadam butang ini?")) {
                toolsData[target].splice(index, 1);
                await setDoc(docRef, toolsData);
                renderLists();
            }
        };

        loadData();
    </script>
</body>
</html>
