<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK – Lupa Kata Laluan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .card { background-color: white; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .btn { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .input-group { position: relative; }
        .input-group svg { position: absolute; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .input-icon-left { left: 1rem; }
        .input-with-icon { padding-left: 2.75rem !important; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50">

    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-4xl mx-auto py-4 px-4 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-indigo-600 p-1.5 rounded-lg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white">
                        <path d="M4 4H8V8H4V4Z" fill="currentColor"></path><path d="M4 16H8V20H4V16Z" fill="currentColor"></path><path d="M16 4H20V8H16V4Z" fill="currentColor"></path><path d="M10 4H14V6H10V4Z" fill="currentColor"></path><path d="M10 8H12V10H10V8Z" fill="currentColor"></path><path d="M12 12H14V14H12V12Z" fill="currentColor"></path><path d="M10 16H12V18H10V16Z" fill="currentColor"></path><path d="M14 16H16V18H14V16Z" fill="currentColor"></path><path d="M16 12H18V14H16V12Z" fill="currentColor"></path><path d="M16 8H20V10H16V8Z" fill="currentColor"></path><path d="M12 18H14V20H12V18Z" fill="currentColor"></path><path d="M4 10H6V14H4V10Z" fill="currentColor"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold text-indigo-900 tracking-tight">SPARK</span>
            </div>
            <button onclick="window.location.href='index.html'" class="text-sm font-semibold text-gray-500 hover:text-indigo-600 transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
                Kembali
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="card w-full max-w-md p-6 sm:p-8">
            
            <div class="text-center mb-8">
                <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-indigo-100 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Tetap Semula Kata Laluan</h2>
                <p class="text-sm text-gray-500 mt-2" id="step-description">Sila masukkan No. Kad Pengenalan anda untuk carian rekod.</p>
            </div>

            <div id="step-1-ic" class="fade-in">
                <form onsubmit="verifyIC(event)">
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1">No. Kad Pengenalan</label>
                        <div class="input-group">
                            <svg class="h-5 w-5 input-icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0c0 .884-.5 1.5-1.5 1.5S8 7 8 6m4 0c0 .884.5 1.5 1.5 1.5S15 7 15 6" />
                            </svg>
                            <input type="text" id="reset-ic" class="block w-full input-with-icon pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono tracking-widest text-center" placeholder="Cth: 900101131234" maxlength="12" pattern="\d{12}" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                        </div>
                        <p id="error-step-1" class="text-xs text-red-500 mt-2 hidden text-center bg-red-50 py-1.5 rounded-lg"></p>
                    </div>
                    <button type="submit" id="btn-step-1" class="btn w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl shadow-md">Teruskan</button>
                </form>
            </div>

            <div id="step-2-verify" class="hidden fade-in">
                <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-3 mb-5 text-center">
                    <p class="text-xs text-indigo-800 font-medium">Rekod ditemui untuk:</p>
                    <p id="verify-name" class="font-bold text-sm text-indigo-900 uppercase mt-0.5"></p>
                </div>
                <form onsubmit="verifyDetails(event)">
                    <div class="space-y-4 mb-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">E-mel Berdaftar</label>
                            <div class="input-group">
                                <svg class="h-5 w-5 input-icon-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                <input type="email" id="verify-email" class="block w-full input-with-icon pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" placeholder="Masukkan E-mel anda" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">No. Telefon Berdaftar</label>
                            <div class="input-group">
                                <svg class="h-5 w-5 input-icon-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                <input type="tel" id="verify-phone" class="block w-full input-with-icon pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" placeholder="Contoh: 0123456789" pattern="[0-9]+" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                            </div>
                        </div>
                        <p id="error-step-2" class="text-xs text-red-500 mt-2 hidden text-center bg-red-50 py-1.5 rounded-lg"></p>
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="cancelToStep1()" class="btn w-1/3 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl">Batal</button>
                        <button type="submit" id="btn-step-2" class="btn w-2/3 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">Sahkan Identiti</button>
                    </div>
                </form>
            </div>

            <div id="step-3-password" class="hidden fade-in">
                <div class="bg-green-50 border border-green-200 rounded-lg p-3 mb-5 text-center flex items-center justify-center gap-2">
                    <svg class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <p class="text-xs text-green-800 font-bold uppercase">Identiti Disahkan</p>
                </div>
                <form onsubmit="setNewPassword(event)">
                    <div class="space-y-4 mb-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kata Laluan Baharu</label>
                            <div class="input-group">
                                <svg class="h-5 w-5 input-icon-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                <input type="password" id="new-password" class="block w-full input-with-icon pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm tracking-widest font-semibold" placeholder="Minima 6 aksara" required minlength="6">
                                <button type="button" onclick="togglePassword('new-password', 'eye-icon-1')" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-indigo-600 focus:outline-none">
                                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.71-1.59c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29" /></svg>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sahkan Kata Laluan Baharu</label>
                            <div class="input-group">
                                <svg class="h-5 w-5 input-icon-left" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                <input type="password" id="confirm-password" class="block w-full input-with-icon pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm tracking-widest font-semibold" placeholder="Taip semula kata laluan" required minlength="6">
                                <button type="button" onclick="togglePassword('confirm-password', 'eye-icon-2')" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-indigo-600 focus:outline-none">
                                    <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.71-1.59c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29" /></svg>
                                </button>
                            </div>
                        </div>
                        <p id="error-step-3" class="text-xs text-red-500 mt-2 hidden text-center bg-red-50 py-1.5 rounded-lg"></p>
                    </div>
                    <button type="submit" id="btn-step-3" class="btn w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">Simpan Kata Laluan</button>
                </form>
            </div>

        </div>
    </main>

    <div id="success-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center m-4 fade-in">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Berjaya!</h3>
            <p class="text-sm text-gray-500 mb-6">Kata laluan anda telah berjaya dikemas kini. Sila log masuk semula menggunakan kata laluan yang baharu.</p>
            <button onclick="window.location.href='index.html'" class="btn w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">Kembali Log Masuk</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // TAMBAHAN: Import serverTimestamp
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // Import Firebase Auth
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // Initialise Auth
        const appId = firebaseConfig.projectId;

        // Log masuk secara awanama agar request.auth != null
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("Gagal menyambung ke pelayan pengesahan:", error);
                }
            }
        });

        // Global Variables
        let currentUserDocId = null;
        let currentUserData = null;

        // FUNGSI: Tunjuk/Sembunyi Password
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            } else {
                input.type = 'password';
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.71-1.59c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29" />`;
            }
        }

        // LANGKAH 1: Semak IC
        window.verifyIC = async function(event) {
            event.preventDefault();
            const ic = document.getElementById('reset-ic').value.trim();
            const errorMsg = document.getElementById('error-step-1');
            const btn = document.getElementById('btn-step-1');

            if (ic.length !== 12) {
                errorMsg.textContent = "Sila masukkan 12 digit IC tanpa sengkang.";
                errorMsg.classList.remove('hidden');
                return;
            }

            // Semak adakah pengguna sudah authenticated oleh Firebase
            if (!auth.currentUser) {
                errorMsg.textContent = "Sedang menyambung ke pelayan, sila cuba lagi dalam beberapa saat.";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
            errorMsg.classList.add('hidden');

            try {
                const q = query(collection(db, `artifacts/${appId}/public/data/spark_participants`), where("ic", "==", ic));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    errorMsg.textContent = "Rekod IC tidak ditemui. Pastikan anda telah mendaftar di SPARK.";
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = "Teruskan";
                    return;
                }

                // Pengguna ditemui
                currentUserDocId = snapshot.docs[0].id;
                currentUserData = snapshot.docs[0].data();

                // Semak jika pengguna belum pernah isi profile langsung (tiada email/phone)
                if (!currentUserData.email || !currentUserData.phone) {
                    errorMsg.innerHTML = `Profil anda belum lengkap. Anda tidak boleh menukar kata laluan. Sila <a href="edit.html?ic=${ic}" class="underline font-bold text-indigo-700">Lengkapkan Profil</a> terlebih dahulu.`;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = "Teruskan";
                    return;
                }

                // Pergi ke Langkah 2
                document.getElementById('step-1-ic').classList.add('hidden');
                document.getElementById('step-2-verify').classList.remove('hidden');
                document.getElementById('step-description').textContent = "Sila masukkan e-mel dan no. telefon yang berdaftar untuk tujuan pengesahan keselamatan.";
                document.getElementById('verify-name').textContent = currentUserData.name;

            } catch (error) {
                console.error(error);
                errorMsg.textContent = "Ralat pelayan. Sila cuba sebentar lagi.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "Teruskan";
            }
        }

        // Batal / Kembali ke Langkah 1
        window.cancelToStep1 = function() {
            document.getElementById('step-2-verify').classList.add('hidden');
            document.getElementById('step-1-ic').classList.remove('hidden');
            document.getElementById('step-description').textContent = "Sila masukkan No. Kad Pengenalan anda untuk carian rekod.";
            document.getElementById('verify-email').value = '';
            document.getElementById('verify-phone').value = '';
            document.getElementById('error-step-2').classList.add('hidden');
            
            const btn = document.getElementById('btn-step-1');
            btn.disabled = false;
            btn.innerHTML = "Teruskan";
            
            currentUserDocId = null;
            currentUserData = null;
        }

        // LANGKAH 2: Pengesahan Padanan Data (Matching)
        window.verifyDetails = function(event) {
            event.preventDefault();
            const inputEmail = document.getElementById('verify-email').value.trim().toLowerCase();
            const inputPhone = document.getElementById('verify-phone').value.trim();
            const errorMsg = document.getElementById('error-step-2');
            const btn = document.getElementById('btn-step-2');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = "Mengesahkan...";

            // Simulasi proses delay keselamatan
            setTimeout(() => {
                const dbEmail = (currentUserData.email || "").toLowerCase();
                const dbPhone = currentUserData.phone || "";

                if (inputEmail === dbEmail && inputPhone === dbPhone) {
                    // Berjaya Sah
                    document.getElementById('step-2-verify').classList.add('hidden');
                    document.getElementById('step-3-password').classList.remove('hidden');
                    document.getElementById('step-description').textContent = "Sila tetapkan kata laluan baharu anda. Pastikan mudah diingat.";
                } else {
                    errorMsg.innerHTML = "<b>Pengesahan Gagal!</b><br>E-mel atau No. Telefon tidak sepadan dengan rekod kami.";
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = "Sahkan Identiti";
                }
            }, 800);
        }

        // LANGKAH 3: Simpan Kata Laluan Baru
        window.setNewPassword = async function(event) {
            event.preventDefault();
            const pw1 = document.getElementById('new-password').value;
            const pw2 = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-step-3');
            const btn = document.getElementById('btn-step-3');

            if (pw1.length < 6) {
                errorMsg.textContent = "Kata laluan mestilah sekurang-kurangnya 6 aksara.";
                errorMsg.classList.remove('hidden');
                return;
            }

            if (pw1 !== pw2) {
                errorMsg.textContent = "Kata laluan tidak sepadan. Sila taip dengan teliti.";
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;

            try {
                // Update Firestore dengan serverTimestamp
                const userRef = doc(db, `artifacts/${appId}/public/data/spark_participants`, currentUserDocId);
                await updateDoc(userRef, {
                    password: pw1,
                    passwordUpdatedAt: serverTimestamp() // KOD DITAMBAH DI SINI
                });

                // Show Success Modal
                document.getElementById('success-modal').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                errorMsg.textContent = "Gagal menyimpan kata laluan. Sila cuba lagi.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = "Simpan Kata Laluan";
            }
        }
    </script>
