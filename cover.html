<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paparan Pendaftaran SPARK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Abstract Background Elements */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        .shape-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(79, 70, 229, 0.3); border-radius: 50%; }
        .shape-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: rgba(139, 92, 246, 0.2); border-radius: 50%; }

        /* Main Container */
        .cover-container {
            width: 95vw; 
            max-width: 1600px;
            height: 90vh; 
            max-height: 900px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top Header Bar */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }

        /* Content Layout */
        .content-area {
            display: flex;
            flex: 1;
            padding: 3rem;
            gap: 4rem;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-panel {
            width: 45%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Typography */
        .program-title {
            /* Kurangkan saiz maksimum supaya tidak terlalu gergasi */
            font-size: clamp(1.5rem, 3.5vw, 2.75rem);
            font-weight: 800;
            color: #1e3a8a; /* Indigo-900 */
            line-height: 1.3;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            
            /* Hadkan baris teks supaya tidak melimpah (Max 3 Baris) */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            border: 1px solid #f3f4f6;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .info-icon-box {
            padding: 0.75rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Infographic Bar */
        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
        }

        #progress-bar-container {
            height: 1rem;
            border-radius: 9999px;
            background-color: #f3f4f6;
            overflow: hidden;
            margin-top: 1rem;
        }

        #progress-bar-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }

        /* QR Code Card */
        .qr-card {
            background: white;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px solid #e0e7ff; /* Indigo-100 */
            width: 100%;
        }

        #qr-code-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            border-radius: 1rem;
        }

        /* Live Check-in Toast (Slide Down from Top) */
        #live-toast {
            position: fixed;
            top: -100px; /* Hidden initially */
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        #live-toast.show {
            top: 2rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content-area { flex-direction: column; padding: 2rem; gap: 2rem; overflow-y: auto;}
            .right-panel { width: 100%; max-width: 400px; margin: 0 auto; }
            .info-grid { grid-template-columns: 1fr; }
            .cover-container { height: 95vh; }
            .program-title { -webkit-line-clamp: 4; } /* Benarkan 4 baris untuk skrin kecil */
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="live-toast">
        <div class="bg-white/20 p-1.5 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <div>
            <p class="text-sm font-medium text-emerald-100 uppercase tracking-wider mb-0.5">Selamat Datang</p>
            <p id="toast-name" class="text-xl font-bold uppercase tracking-wide leading-none"></p>
        </div>
    </div>

    <div class="cover-container">

        <div class="top-header">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-md">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white">
                        <path d="M4 4H8V8H4V4Z" fill="currentColor"></path><path d="M4 16H8V20H4V16Z" fill="currentColor"></path><path d="M16 4H20V8H16V4Z" fill="currentColor"></path><path d="M10 4H14V6H10V4Z" fill="currentColor"></path><path d="M10 8H12V10H10V8Z" fill="currentColor"></path><path d="M12 12H14V14H12V12Z" fill="currentColor"></path><path d="M10 16H12V18H10V16Z" fill="currentColor"></path><path d="M14 16H16V18H14V16Z" fill="currentColor"></path><path d="M16 12H18V14H16V12Z" fill="currentColor"></path><path d="M16 8H20V10H16V8Z" fill="currentColor"></path><path d="M12 18H14V20H12V18Z" fill="currentColor"></path><path d="M4 10H6V14H4V10Z" fill="currentColor"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-indigo-900 leading-none">SPARK</h1>
                    <p class="text-xs text-gray-500 font-medium">Sistem Kehadiran Digital</p>
                </div>
            </div>
            
            <button onclick="redirectToDashboard()" class="bg-white border border-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-xl shadow-sm hover:bg-gray-50 flex items-center gap-2 text-sm transition duration-150">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg>
                <span>Dashboard Admin</span>
            </button>
        </div>

        <div class="content-area">
            
            <div class="left-panel">
                <div>
                    <p class="text-sm font-bold text-indigo-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span> Pendaftaran Kini Dibuka
                    </p>
                    <h2 id="program-name" class="program-title" title="Memuatkan...">MEMUATKAN MAKLUMAT...</h2>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-icon-box bg-purple-100 text-purple-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-0.5">Penyelaras</p>
                                <p id="program-penyelaras" class="text-sm font-bold text-gray-800 uppercase leading-snug">...</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon-box bg-blue-100 text-blue-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-0.5">Lokasi</p>
                                <p id="program-location-output" class="text-sm font-bold text-gray-800 uppercase leading-snug">...</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon-box bg-amber-100 text-amber-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-0.5">Tarikh</p>
                                <p id="program-date-output" class="text-sm font-bold text-gray-800 uppercase leading-snug">...</p>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-icon-box bg-emerald-100 text-emerald-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-0.5">Masa</p>
                                <p id="program-time-output" class="text-sm font-bold text-gray-800 uppercase leading-snug">...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stat-card" id="infographic-card">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Rekod Semasa</p>
                            <p class="text-3xl font-extrabold text-gray-900 mt-1 leading-none"><span id="cover-info-hadir">0</span> <span class="text-sm text-gray-400 font-semibold">/ <span id="cover-info-kuota">0</span> Hadir</span></p>
                        </div>
                        <div class="text-right">
                            <p id="cover-info-peratus" class="text-4xl font-extrabold text-indigo-600 leading-none">0%</p>
                        </div>
                    </div>
                    <div id="progress-bar-container">
                        <div id="progress-bar-fill" style="width: 0%; background-color: #4f46e5;"></div>
                    </div>
                    <p id="status-text" class="text-xs font-medium text-gray-500 mt-2 text-right">Menunggu pendaftaran...</p>
                </div>
            </div>

            <div class="right-panel">
                <div class="qr-card">
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Imbas Untuk Mendaftar</p>
                    <div class="bg-white p-2 rounded-xl shadow-inner border border-gray-100 w-full">
                        <img id="qr-code-image" src="https://placehold.co/400x400/ffffff/111827?text=Loading+QR" alt="QR Code Kehadiran">
                    </div>
                    <div class="mt-6 flex items-center justify-center gap-2 text-xs font-medium text-gray-400 bg-gray-50 px-4 py-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                        Dijana oleh SPARK System
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-95 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="text-center p-8 rounded-2xl shadow-xl bg-white border border-indigo-100">
            <svg class="animate-spin h-10 w-10 text-indigo-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="mt-4 text-lg font-bold text-gray-800">Menyediakan Paparan...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };

        let db, auth;
        const appId = firebaseConfig.projectId;
        let isInitialLoad = true; 
        let currentLoadedProgram = null;
        let currentProgramKey = null; 
        let lastAttendanceCount = 0; 

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
        } catch (e) {
             console.error("Ralat memulakan Firebase:", e); 
             showError('Ralat memulakan Firebase. Sila semak konsol.');
        }

        window.redirectToDashboard = function() {
            if (currentProgramKey) {
                 window.location.href = `program.html?kod=${currentProgramKey}`;
            } else {
                 showError("Kunci program tidak ditemui.");
            }
        }

        function formatDate(date) { 
            if (!date) return 'T/A'; 
            const d = typeof date === 'string' ? new Date(date.split('T')[0] + 'T00:00:00') : (date.toDate ? date.toDate() : date); 
            return d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' }); 
        }

        function formatDateRange(start, end) { 
            return start === end ? formatDate(start) : `${formatDate(start)} - ${formatDate(end)}`; 
        }

        function formatTimeMalay(timeString) { 
            if (!timeString) return 'T/A'; 
            const [hourStr, minuteStr] = timeString.split(':'); 
            let hour = parseInt(hourStr, 10); 
            let period; 
            if (hour === 0) { period = 'TGH MALAM'; hour = 12; } 
            else if (hour < 12) { period = 'PAGI'; } 
            else if (hour === 12) { period = 'TGH HARI'; } 
            else { period = 'PETANG'; hour -= 12; } 
            return `${hour}:${minuteStr} ${period}`; 
        }

        function formatTimeRange(start, end) { 
            return `${formatTimeMalay(start)} - ${formatTimeMalay(end)}`; 
        }

        function showError(message) {
            const overlay = document.getElementById('loading-overlay');
            overlay.innerHTML = `<div class="text-center p-8 rounded-2xl shadow-xl bg-white border border-red-200"><div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4"><svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div><p class="text-xl font-bold text-gray-900">Ralat Sistem</p><p class="mt-2 text-sm text-gray-500">${message}</p></div>`;
            overlay.classList.remove('hidden');
        }
        
        function renderCoverInfographic() {
            if (!currentLoadedProgram) return;
            
            const jumlahHadir = (currentLoadedProgram.attendance || []).length;
            const kuota = parseInt(currentLoadedProgram.quota) || 0;
            
            const hadirEl = document.getElementById('cover-info-hadir');
            const kuotaEl = document.getElementById('cover-info-kuota');
            const peratusEl = document.getElementById('cover-info-peratus');
            const progressBarFill = document.getElementById('progress-bar-fill'); 
            const statusText = document.getElementById('status-text');

            if (kuota > 0) {
                const rawPeratus = (jumlahHadir / kuota) * 100;
                const displayPeratus = Math.round(rawPeratus);
                const visualPeratus = Math.min(100, rawPeratus); 

                hadirEl.textContent = jumlahHadir;
                kuotaEl.textContent = kuota;
                peratusEl.textContent = `${displayPeratus}%`;
                
                progressBarFill.style.width = `${visualPeratus}%`;

                // Logik Warna Moden
                let fillColor = '#4f46e5'; // Indigo
                let statusMsg = "Pendaftaran sedang berjalan...";

                if (rawPeratus === 0) {
                    fillColor = '#9ca3af'; // Kelabu
                    statusMsg = "Menunggu pendaftaran pertama...";
                } else if (rawPeratus > 0 && rawPeratus <= 40) {
                    fillColor = '#f59e0b'; // Jingga
                } else if (rawPeratus > 40 && rawPeratus < 100) {
                    fillColor = '#3b82f6'; // Biru
                } else if (rawPeratus >= 100) {
                    fillColor = '#10b981'; // Hijau Emerald
                    statusMsg = "Kuota penuh / Mencapai sasaran!";
                    peratusEl.classList.remove('text-indigo-600');
                    peratusEl.classList.add('text-emerald-600');
                } 
                
                progressBarFill.style.backgroundColor = fillColor;
                statusText.textContent = statusMsg;

            } else {
                hadirEl.textContent = jumlahHadir;
                kuotaEl.textContent = '-';
                peratusEl.textContent = '-';
                progressBarFill.style.width = jumlahHadir > 0 ? '100%' : '0%';
                progressBarFill.style.backgroundColor = '#10b981';
                statusText.textContent = jumlahHadir > 0 ? "Pendaftaran sedang berjalan..." : "Menunggu pendaftaran pertama...";
            }
        }
        
        // Live Toast Slide Down
        function showLiveCheckinAlert(name) {
            const toast = document.getElementById('live-toast');
            const nameEl = document.getElementById('toast-name');
            
            nameEl.textContent = name;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000); 
        }

        function renderCoverPage() {
            const currentAttendance = currentLoadedProgram.attendance || [];
            const isNewEntryAdded = currentAttendance.length > lastAttendanceCount;
            const latestEntry = isNewEntryAdded ? currentAttendance[currentAttendance.length - 1] : null; 
            
            // Masukkan title untuk Tooltip HTML asal supaya hover boleh nampak nama penuh
            const programNameEl = document.getElementById('program-name');
            programNameEl.textContent = currentLoadedProgram.name;
            programNameEl.title = currentLoadedProgram.name; 

            document.getElementById('program-penyelaras').textContent = currentLoadedProgram.penyelaras_name ? currentLoadedProgram.penyelaras_name : 'TIDAK DITETAPKAN';
            document.getElementById('program-location-output').textContent = currentLoadedProgram.location;
            document.getElementById('program-date-output').textContent = formatDateRange(currentLoadedProgram.startDate, currentLoadedProgram.endDate);
            document.getElementById('program-time-output').textContent = formatTimeRange(currentLoadedProgram.startTime, currentLoadedProgram.endTime);
            
            renderCoverInfographic(); 

            if (isNewEntryAdded && latestEntry && !isInitialLoad) {
                 showLiveCheckinAlert(latestEntry.name);
            }

            lastAttendanceCount = currentAttendance.length;
            isInitialLoad = false;

            if (currentProgramKey) {
                const baseUrl = window.location.origin + window.location.pathname.replace('cover.html', '');
                const checkinUrl = `${baseUrl}participant.html?kod=${currentProgramKey}`;
                const qrImg = document.getElementById('qr-code-image');
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(checkinUrl)}`;
            }

            // Sembunyikan loading
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 300);
            }, 500);
        }

        function initializeProgramListener(programKey) {
            currentProgramKey = programKey;
            const programRef = doc(db, `artifacts/${appId}/public/data/spark_programs`, programKey);
            
            onSnapshot(programRef, (docSnap) => {
                if (docSnap.exists()) {
                    currentLoadedProgram = { id: docSnap.id, ...docSnap.data() };
                    renderCoverPage(); 
                } else {
                    showError(`Program dengan kunci "${programKey}" tidak wujud atau telah dipadam.`);
                }
            }, (error) => {
                console.error("Ralat mendengar:", error);
                showError(`Sistem kehilangan sambungan. Sila muat semula (refresh) halaman.`);
            });
        }

        function main() {
            const urlParams = new URLSearchParams(window.location.search);
            let programKey = urlParams.get('kod');

            if (!programKey) {
                // Fallback untuk test (Boleh dibuang semasa production)
                programKey = 'PZT-28721'; 
            }

            if (programKey) {
                 onAuthStateChanged(auth, (user) => {
                    if (user) { 
                        initializeProgramListener(programKey);
                    } else { 
                        signInAnonymously(auth).catch((error) => { 
                            showError("Gagal menyambung ke pelayan utama.");
                        }); 
                    }
                });
            } else {
                showError('Pautan tidak sah. Kunci kod (kod=xxx) diperlukan pada URL.');
            }
        }

        main();
    </script>
</body>
</html>
