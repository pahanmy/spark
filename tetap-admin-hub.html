<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Tetapan Hab SPARK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Tetapan Butang Admin Hub</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Tambah atau padam modul untuk paparan admin lantikan.</p>
            </div>
            <a href="admin-hub.html" target="_blank" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-indigo-200 transition">Lihat Admin Hub</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-100 pb-3 mb-4">Tambah Modul Baru</h2>
                
                <form id="add-module-form" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nama Butang / Modul</label>
                        <input type="text" id="mod-title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500" placeholder="Cth: Urus Tempahan">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Penerangan Ringkas</label>
                        <textarea id="mod-desc" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500" placeholder="Fungsi modul ini..."></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Pautan URL (Link)</label>
                        <input type="text" id="mod-url" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500" placeholder="Cth: admin-tempah-spark.html">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Warna Tema</label>
                        <select id="mod-color" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500">
                            <option value="indigo">Indigo (Biru Gelap)</option>
                            <option value="emerald">Emerald (Hijau)</option>
                            <option value="purple">Purple (Ungu)</option>
                            <option value="rose">Rose (Merah/Pink)</option>
                            <option value="amber">Amber (Kuning)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Ikon</label>
                        <select id="mod-icon" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500">
                            <option value="calendar">Kalendar / Jadual</option>
                            <option value="users">Pengguna / Orang</option>
                            <option value="document">Dokumen / Borang</option>
                            <option value="chart">Graf / Laporan</option>
                            <option value="cog">Tetapan / Gear</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl shadow-sm text-xs uppercase tracking-wider transition mt-2">
                        Simpan Modul
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-100 pb-3 mb-4">Senarai Butang Aktif</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-[10px] font-bold text-gray-500 uppercase tracking-wider border-b border-gray-200">
                                <th class="p-3">Maklumat Modul</th>
                                <th class="p-3">Warna / Ikon</th>
                                <th class="p-3 text-right">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="modules-list" class="divide-y divide-gray-100 text-sm">
                            <tr><td colspan="3" class="p-4 text-center text-gray-400">Memuatkan data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = firebaseConfig.projectId;
        const collectionPath = `artifacts/${appId}/public/data/spark_admin_modules`;

        signInAnonymously(auth).then(() => {
            fetchModules();
        });

        // Hantar Data Baru
        document.getElementById('add-module-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.textContent = "Menyimpan...";

            try {
                await addDoc(collection(db, collectionPath), {
                    title: document.getElementById('mod-title').value,
                    desc: document.getElementById('mod-desc').value,
                    url: document.getElementById('mod-url').value,
                    color: document.getElementById('mod-color').value,
                    icon: document.getElementById('mod-icon').value,
                    createdAt: serverTimestamp()
                });
                document.getElementById('add-module-form').reset();
                alert("Berjaya ditambah! Sila semak admin-hub.html");
            } catch (error) {
                console.error("Ralat:", error);
                alert("Gagal menyimpan data.");
            } finally {
                btn.disabled = false; btn.textContent = "Simpan Modul";
            }
        });

        // Ambil dan Papar Senarai
        function fetchModules() {
            const q = query(collection(db, collectionPath), orderBy("createdAt", "asc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('modules-list');
                if(snap.empty) {
                    list.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">Tiada modul. Sila tambah di sebelah.</td></tr>`;
                    return;
                }
                
                let html = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    html += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3">
                                <p class="font-bold text-gray-800 uppercase text-xs">${data.title}</p>
                                <p class="text-[10px] text-gray-500 font-mono mt-0.5">${data.url}</p>
                            </td>
                            <td class="p-3">
                                <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-[10px] font-bold uppercase mr-1">${data.color}</span>
                                <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-[10px] font-bold uppercase">${data.icon}</span>
                            </td>
                            <td class="p-3 text-right">
                                <button onclick="deleteModule('${doc.id}')" class="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider transition">Padam</button>
                            </td>
                        </tr>
                    `;
                });
                list.innerHTML = html;
            });
        }

        // Padam Modul
        window.deleteModule = async function(id) {
            if(confirm("Pasti mahu padam modul ini dari paparan Admin?")) {
                await deleteDoc(doc(db, collectionPath, id));
            }
        }
    </script>
</body>
</html>
