<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Tetapan Hab SPARK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-6 selection:bg-indigo-500 selection:text-white">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Tetapan Butang Admin Hub</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Tambah, kemaskini, atau padam modul untuk paparan admin lantikan.</p>
            </div>
            <a href="admin-hub.html" target="_blank" class="bg-indigo-100 text-indigo-700 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-indigo-200 transition shadow-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                Lihat Admin Hub
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit sticky top-6">
                <h2 id="form-title" class="text-sm font-bold text-indigo-700 uppercase tracking-wider border-b border-gray-100 pb-3 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                    Tambah Modul Baru
                </h2>
                
                <form id="add-module-form" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nama Butang / Modul</label>
                        <input type="text" id="mod-title" required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-medium outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all" placeholder="Cth: Urus Tempahan">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Penerangan Ringkas</label>
                        <textarea id="mod-desc" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all" placeholder="Fungsi modul ini..."></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Pautan URL (Link)</label>
                        <input type="text" id="mod-url" required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-medium outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all" placeholder="Cth: admin-tempah-spark.html">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Warna Tema</label>
                            <select id="mod-color" class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-medium outline-none focus:border-indigo-500 bg-white">
                                <option value="indigo">Indigo (Biru)</option>
                                <option value="emerald">Emerald (Hijau)</option>
                                <option value="purple">Purple (Ungu)</option>
                                <option value="rose">Rose (Merah)</option>
                                <option value="amber">Amber (Kuning)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Ikon</label>
                            <select id="mod-icon" class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-medium outline-none focus:border-indigo-500 bg-white">
                                <option value="calendar">Kalendar</option>
                                <option value="users">Pengguna</option>
                                <option value="document">Dokumen</option>
                                <option value="chart">Laporan</option>
                                <option value="cog">Tetapan</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="pt-2 flex gap-2">
                        <button type="submit" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md text-xs uppercase tracking-wider transition-all flex justify-center items-center gap-2">
                            Simpan Modul
                        </button>
                        <button type="button" id="btn-cancel" onclick="cancelEdit()" class="hidden bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 px-4 rounded-xl text-xs uppercase tracking-wider transition-all border border-gray-200">
                            Batal
                        </button>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-gray-100 pb-3 mb-4">Senarai Butang Aktif</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-gray-50 text-[10px] font-bold text-gray-500 uppercase tracking-wider border-b border-gray-200">
                                <th class="p-4">Maklumat Modul</th>
                                <th class="p-4">Visual</th>
                                <th class="p-4 text-right">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="modules-list" class="divide-y divide-gray-100 text-sm">
                            <tr><td colspan="3" class="p-8 text-center text-gray-400">
                                <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                Memuatkan data...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEBe1XF7cqaxkTNBZBoo3DBJYIuchOEkM",
            authDomain: "myqrhadir.firebaseapp.com",
            projectId: "myqrhadir",
            storageBucket: "myqrhadir.appspot.com",
            messagingSenderId: "799691133747",
            appId: "1:799691133747:web:835a5e3e9413eace806446"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = firebaseConfig.projectId;
        const collectionPath = `artifacts/${appId}/public/data/spark_admin_modules`;

        let allModules = []; // Untuk simpan data sementara
        let currentEditId = null; // Menyimpan ID dokumen jika sedang edit

        signInAnonymously(auth).then(() => {
            fetchModules();
        });

        // ==========================================
        // 1. FUNGSI SIMPAN & KEMASKINI (SUBMIT)
        // ==========================================
        document.getElementById('add-module-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; 
            btn.innerHTML = `<svg class="animate-spin h-4 w-4 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Memproses...`;

            const dataToSave = {
                title: document.getElementById('mod-title').value.trim(),
                desc: document.getElementById('mod-desc').value.trim(),
                url: document.getElementById('mod-url').value.trim(),
                color: document.getElementById('mod-color').value,
                icon: document.getElementById('mod-icon').value
            };

            try {
                if (currentEditId) {
                    // MODE: KEMASKINI (UPDATE)
                    await updateDoc(doc(db, collectionPath, currentEditId), dataToSave);
                    alert("✅ Berjaya dikemaskini!");
                    cancelEdit(); // Kembali ke mod Tambah
                } else {
                    // MODE: TAMBAH BARU (CREATE)
                    dataToSave.createdAt = serverTimestamp();
                    await addDoc(collection(db, collectionPath), dataToSave);
                    document.getElementById('add-module-form').reset();
                    alert("✅ Modul baharu berjaya ditambah!");
                }
            } catch (error) {
                console.error("Ralat:", error);
                alert("Gagal memproses data. Sila pastikan capaian internet anda stabil.");
            } finally {
                btn.disabled = false; 
                // Restore button text based on mode
                btn.innerHTML = currentEditId ? "Kemaskini Modul" : "Simpan Modul";
            }
        });

        // ==========================================
        // 2. FUNGSI AMBIL DATA DARI FIREBASE
        // ==========================================
        function fetchModules() {
            const q = query(collection(db, collectionPath), orderBy("createdAt", "asc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('modules-list');
                allModules = []; // Reset array
                
                if(snap.empty) {
                    list.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-500 font-medium">Tiada modul dijumpai. Sila tambah di sebelah.</td></tr>`;
                    return;
                }
                
                let html = '';
                snap.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    allModules.push(data); // Simpan dlm array supaya mudah nak dipanggil waktu edit
                    
                    html += `
                        <tr class="hover:bg-indigo-50/50 transition-colors group">
                            <td class="p-4">
                                <p class="font-bold text-gray-800 uppercase text-xs">${data.title}</p>
                                <p class="text-[10px] text-gray-500 font-medium mt-0.5 truncate max-w-xs">${data.desc}</p>
                                <a href="${data.url}" target="_blank" class="text-[10px] text-indigo-500 hover:underline font-mono mt-1 block">${data.url}</a>
                            </td>
                            <td class="p-4">
                                <div class="flex gap-1.5">
                                    <span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded text-[10px] font-bold uppercase border border-gray-200">${data.color}</span>
                                    <span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded text-[10px] font-bold uppercase border border-gray-200">${data.icon}</span>
                                </div>
                            </td>
                            <td class="p-4 text-right">
                                <div class="flex justify-end gap-2 opacity-100 sm:opacity-50 group-hover:opacity-100 transition-opacity">
                                    <button onclick="editModule('${data.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors border border-blue-200 hover:border-blue-600">Edit</button>
                                    <button onclick="deleteModule('${data.id}')" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors border border-red-200 hover:border-red-600">Padam</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                list.innerHTML = html;
            });
        }

        // ==========================================
        // 3. FUNGSI PERSEDIAAN EDIT (Masukkan data ke form)
        // ==========================================
        window.editModule = function(id) {
            const mod = allModules.find(m => m.id === id);
            if (!mod) return;

            // Masukkan data ke dalam input
            document.getElementById('mod-title').value = mod.title;
            document.getElementById('mod-desc').value = mod.desc;
            document.getElementById('mod-url').value = mod.url;
            document.getElementById('mod-color').value = mod.color;
            document.getElementById('mod-icon').value = mod.icon;

            // Set ID Semasa
            currentEditId = id;

            // Tukar Visual UI Borang
            document.getElementById('form-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg> Kemaskini Modul`;
            document.getElementById('form-title').classList.replace('text-indigo-700', 'text-blue-600');
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.textContent = "Kemaskini Modul";
            btnSubmit.classList.replace('bg-indigo-600', 'bg-blue-600');
            btnSubmit.classList.replace('hover:bg-indigo-700', 'hover:bg-blue-700');
            
            document.getElementById('btn-cancel').classList.remove('hidden');

            // Skrol kembali ke atas (mobile friendly)
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ==========================================
        // 4. FUNGSI BATAL EDIT (Kembali ke mode asal)
        // ==========================================
        window.cancelEdit = function() {
            currentEditId = null;
            document.getElementById('add-module-form').reset();
            
            // Kembalikan Visual UI Asal
            document.getElementById('form-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg> Tambah Modul Baru`;
            document.getElementById('form-title').classList.replace('text-blue-600', 'text-indigo-700');

            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.textContent = "Simpan Modul";
            btnSubmit.classList.replace('bg-blue-600', 'bg-indigo-600');
            btnSubmit.classList.replace('hover:bg-blue-700', 'hover:bg-indigo-700');
            
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        // ==========================================
        // 5. FUNGSI PADAM MODUL
        // ==========================================
        window.deleteModule = async function(id) {
            if(confirm("Adakah anda pasti mahu memadam modul ini dari paparan Admin? Tindakan ini tidak boleh diundur.")) {
                try {
                    await deleteDoc(doc(db, collectionPath, id));
                    // Jika sedang edit modul yang sama, batalkan edit
                    if(currentEditId === id) cancelEdit();
                } catch(e) {
                    alert("Ralat memadam data.");
                }
            }
        }
    </script>
</body>
</html>
